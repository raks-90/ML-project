<!DOCTYPE html>
<html>
<head>
    <title>Webcam - Fingerprint AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            background: url("/static/fingerprint_bg.jpg") no-repeat center/cover;
            color: white;
            text-align: center;
        }

        /* DARK OVERLAY */
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: -1;
        }

        h2 {
            margin-top: 20px;
            letter-spacing: 1px;
        }

        /* GLASS CARD */
        .card {
            width: 800px;
            margin: 30px auto;
            padding: 25px;
            border-radius: 20px;

            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);

            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        /* CAMERA FRAME */
        .scanner {
            position: relative;
            display: inline-block;
            border: 2px solid #38bdf8;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px #38bdf8;
        }

        .scanner img {
            border-radius: 12px;
        }

        /* SCAN LINE */
        .scanner::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 3px;
            background: #38bdf8;
            animation: scan 2s infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* BUTTON */
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #38bdf8, #0ea5e9);
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.07);
            box-shadow: 0 0 15px #38bdf8;
        }

        select {
            padding: 10px;
            border-radius: 8px;
            border: none;
            width: 200px;
            margin-top: 10px;
        }

        /* RESULT BOX */
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(0,0,0,0.6);
        }

        .heatmap {
            display: none;
            margin-top: 15px;
        }

        .back-btn {
            background: #ef4444;
        }

        .back-btn:hover {
            box-shadow: 0 0 10px red;
        }

    </style>
</head>

<body>

<h2>📷 AI Fingerprint Live Detection</h2>

<div class="card">

    <!-- STEP 1: LIVE CAMERA -->
    {% if not captured_image %}
        <div class="scanner">
            <img src="{{ url_for('video_feed') }}" width="650">
        </div>

        <br>

        <form action="/capture" method="post">
            <button>📸 Capture</button>
        </form>
    {% endif %}

    <!-- STEP 2: SHOW CAPTURE -->
    {% if captured_image %}
        <h3>Captured Image</h3>

        <img src="{{ captured_image }}" width="400">

        <!-- STEP 3: USER INPUT -->
        <form action="/predict_camera" method="post">

            <input type="hidden" name="image_path" value="{{ captured_image }}">

            <h3>Select Actual Fingerprint</h3>

            <select name="actual" required>
                <option value="">-- Select --</option>
                <option value="REAL">REAL</option>
                <option value="FAKE">FAKE</option>
            </select>

            <br>

            <button type="submit">🔍 Predict</button>

        </form>
    {% endif %}

    <!-- STEP 4: RESULT -->
    {% if prediction %}
        <div class="result-box">

            <h2 style="color: {% if prediction == 'REAL' %}#22c55e{% else %}#ef4444{% endif %};">
                {{ prediction }}
            </h2>

            <h3>Confidence: {{ confidence }}%</h3>

            <button onclick="toggleHeatmap()">🔥 Show Heatmap</button>

            <div class="heatmap" id="heatmapBox">
                <img src="{{ heatmap_path }}" width="400">
            </div>

        </div>
        <br>
        <a href="/restart_camera">
            <button style="background:#22c55e;">🔄 Replay / Capture Again</button>
        </a>
    {% endif %}

    <!-- BACK -->
    <a href="/home">
        <button class="back-btn">⬅ Back</button>
    </a>

</div>

<script>
function toggleHeatmap() {
    let box = document.getElementById("heatmapBox");
    box.style.display = (box.style.display === "none") ? "block" : "none";
}
</script>

</body>
</html>
