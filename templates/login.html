<!DOCTYPE html>
<html>
<head>
    <title>Secure Login | Fingerprint AI System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #0f172a, #1e293b);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .navbar {
            background: #0b1220;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            margin: 0;
            color: #38bdf8;
            font-size: 20px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            padding: 8px 14px;
            border-radius: 6px;
            background: #1e293b;
        }

        .navbar a:hover {
            background: #38bdf8;
            color: black;
        }

        /* Center Login Box */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #1e293b;
            padding: 35px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            border: 1px solid #334155;
        }

        .card h2 {
            margin-bottom: 20px;
            color: #38bdf8;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            width: 95%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        .footer {
            text-align: center;
            padding: 15px;
            background: #0b1220;
            font-size: 12px;
            color: #94a3b8;
        }

        .link {
            display: block;
            margin-top: 15px;
            color: #38bdf8;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<!-- TOP NAVBAR -->
<div class="navbar">
    <h2>🛂 Fingerprint Authentication Portal</h2>
    <div>
        <a href="/register">Register</a>
        <a href="/">Home</a>
    </div>
</div>

<!-- LOGIN BOX -->
<div class="container">
    <div class="card">
    <h2>🔐 Secure Login</h2>

    {% if error %}
    <p style="color:#ef4444; margin-bottom:10px;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input name="username" placeholder="Enter Username" required>
        <input name="password" type="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>

    <a class="link" href="/register">Don't have an account? Register here</a>
</div>



</body>
</html>
